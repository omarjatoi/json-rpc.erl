name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build / xref / dialyzer / ct
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache rebar3 build artifacts
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-rebar3-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-

      - name: Compile
        run: nix develop --command rebar3 compile

      - name: Xref
        run: nix develop --command rebar3 xref

      - name: Dialyzer
        run: nix develop --command rebar3 dialyzer

      - name: Common Test
        run: nix develop --command rebar3 ct

      - name: Coverage
        run: nix develop --command rebar3 cover --verbose
